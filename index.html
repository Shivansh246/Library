<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <table class="displayTable">
        <thead>
        <tr class="header">
            <th>Name</th>
            <th>Author</th>
            <th>Pages</th>
            <th>Read</th>
            <th>&nbsp;</th>
        </tr>
        </thead>

        <tbody>

        </tbody>
    </table>
        <button type="button" id="dialog-open">New Book</button>
        <dialog id="my-dialog">
        <form>
            <label for="bookTitle">Enter book title: </label>
            <input type="text" id="bookTitle" name="bookTitle"><br>

            <label for="bookAuthor">Enter book author: </label>
            <input id="bookAuthor" type="text" name="bookAuthor"><br>

            <label for="pages">Enter number of pages: </label>
            <input id="pages" type="number" name="pages"><br>

            <input type="radio" id="read" name="read" value="read">
            <label for="read">Read</label>
            
            <input type="radio" id="notRead" name="read" value="not read" checked>
            <label for="notRead">Not Read</label><br>
            
            <button type="button" formmethod="dialog" id="formSubmitBtn">Submit</button>
        </form>
        
    </dialog>
</body>
</html>
